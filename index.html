<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="© 2024 NINS (by JPGT). Face Mesh Tracking System with Audio/Video Recording.">
    <title>nins/Video</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
    </script>

    <style>
        /* 讓 HTML 與 body 佔滿整個瀏覽器視窗 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 未被畫面填滿的區域會顯示黑色 */
            font-family: "Courier New", Courier, monospace, Arial, sans-serif; /* 復古終端機風格 */
            color: #00ff66;
            user-select: none;
        }

        /* 滿版容器 */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 錄影時的閃爍邊框樣式 */
        .container.recording-border {
            border-color: #ff3333;
            animation: rec-border-blink 1s infinite;
        }
        /* 錄影時的閃爍邊框樣式 */
        #output_canvas.recording-border {
            border: 4px solid #ff3333;
            box-sizing: border-box;
            animation: rec-border-blink 1s infinite;
        }

        /* 視訊與畫布等比例縮放 */
        #webcam, #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保證鏡頭畫面 100% 完整呈現 */
        }

        #webcam {
            transform: scaleX(-1); /* 鏡像翻轉 */
            transition: opacity 0.3s ease;
            opacity: 0; /* 預設隱藏視訊背景 */
        }

        /* 當含有 .show 類別時才顯示視訊畫面 */
        #webcam.show {
            opacity: 1;
        }

        /* 狀態列：浮動在正上方 */
        #status-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
            width: 340px;
            background: rgba(5, 5, 5, 0.85);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            pointer-events: none;
        }
        #status {
            color: #ffb74d;
            font-weight: bold;
        }

        /* 浮動儀表板：浮動在左下方顯示雙眼中心座標 */
        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(5, 5, 5, 0.85);
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #00ff66;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
            pointer-events: none;
        }

        /* 右上方錄影控制控制台 */
        #control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            background: rgba(5, 5, 5, 0.85);
            padding: 15px 20px;
            border-radius: 4px;
            border: 1px solid #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: #000;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 8px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s ease;
            width: 100%;
            text-align: center;
        }

        .btn:hover {
            background: #00ff66;
            color: #000;
            box-shadow: 0 0 10px #00ff66;
        }

        .btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            background: #111;
        }

        /* 錄影狀態指示燈 */
        #rec-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #888;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #555;
            border-radius: 50%;
        }

        .recording .dot {
            background-color: #ff3333;
            box-shadow: 0 0 8px #ff3333;
            animation: blink 1s infinite;
        }

        .recording #rec-text {
            color: #ff3333;
            font-weight: bold;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 狀態指示列 -->
    <div id="status-container" style="display: none;">
        <div id="status">正在初始化系統...</div>
    </div>

    <!-- 浮動顯示雙眼瞳孔座標 -->
    <div id="info-panel" style="display: none;">
        EYE_TRACKING_DATA >> <br>
        <span id="coord-display" style="color: #00ffff;">等待系統就緒...</span>
    </div>

    <!-- 右上方錄影控制台 -->
    <div id="control-panel" style="display: none;">
        <div id="rec-indicator">
            <span class="dot"></span>
            <span id="rec-text">STANDBY</span>
        </div>
        <button id="btn-record" class="btn" disabled>開始錄影 (REC)</button>
        <button id="btn-toggle-cam" class="btn">切換鏡頭底圖</button>
    </div>

    <!-- 滿版視訊與 Canvas 容器 -->
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");

        const statusContainer = document.getElementById("status-container");
        const statusDiv = document.getElementById("status");
        const coordDisplay = document.getElementById("coord-display");

        const btnRecord = document.getElementById("btn-record");
        const btnToggleCam = document.getElementById("btn-toggle-cam");
        const recIndicator = document.getElementById("rec-indicator");
        const recText = document.getElementById("rec-text");

        let faceLandmarker = undefined;
        let lastVideoTime = -1;

        // 🎙️ 錄影與媒體串流全域變數
        let mediaRecorder = null;
        let recordedChunks = [];
        let audioTrack = null;
        let isRecording = false;

        // 切換鏡頭實體底圖顯示/隱藏
        btnToggleCam.addEventListener("click", () => {
            video.classList.toggle("show");
        });

        // 1. 初始化臉部網格偵測器
        async function initFace() {
            try {
                statusDiv.innerText = "正在載入 WebAssembly 核心...";
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );

                statusDiv.innerText = "正在載入 FaceLandmarker 模型...";
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numFaces: 1
                });

                statusDiv.innerText = "模型載入成功！請求相機與麥克風...";
                statusDiv.style.color = "#00ff66";

                await startCameraAndMic();
                toggleRecording();
            } catch (error) {
                statusDiv.innerText = "初始化失敗：" + error.message;
                statusDiv.style.color = "#ef5350";
            }
        }

        // 2. 啟動相機與麥克風媒體串流
        async function startCameraAndMic() {
            try {
                // 同時請求影像與麥克風聲音
                const userStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: true
                });

                // 取得麥克風音訊軌道
                audioTrack = userStream.getAudioTracks()[0];

                // 建立僅含視訊的串流指派給 <video>，防止喇叭輸出聲音造成極音迴音
                const videoOnlyStream = new MediaStream(userStream.getVideoTracks());
                video.srcObject = videoOnlyStream;

                video.addEventListener("loadeddata", () => {
                    canvasElement.width = video.videoWidth;
                    canvasElement.height = video.videoHeight;

                    statusContainer.style.display = "none";
                    
                    // 啟用錄影按鈕
                    btnRecord.disabled = false;
                    btnRecord.addEventListener("click", toggleRecording);

                    // 初始化 MediaRecorder
                    setupRecorder();

                    // 開始渲染循環
                    requestAnimationFrame(predictWebcam);
                });
            } catch (err) {
                statusDiv.innerText = "權限取得失敗 (請允許相機與麥克風)：" + err;
                statusDiv.style.color = "#ef5350";
            }
        }

        // 3. 設定 MediaRecorder 錄影管線
        function setupRecorder_webm() {
            // 從 Canvas 擷取畫面串流 (30 FPS)
            const canvasStream = canvasElement.captureStream(30);

            // 建立混合串流：包含 Canvas 視訊 + 麥克風音訊
            const combinedStream = new MediaStream();
            canvasStream.getVideoTracks().forEach(track => combinedStream.addTrack(track));

            if (audioTrack) {
                combinedStream.addTrack(audioTrack);
            }

            // 選擇適合的編碼格式
            const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
                ? 'video/webm;codecs=vp9,opus'
                : 'video/webm';

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = saveVideo;
        }
        function setupRecorder() {
            const canvasStream = canvasElement.captureStream(30);
            const combinedStream = new MediaStream();
            
            canvasStream.getVideoTracks().forEach(track => combinedStream.addTrack(track));
            if (audioTrack) combinedStream.addTrack(audioTrack);

            // 優先尋找支援 MP4 的 MIME Type
            let mimeType = 'video/webm';
            if (MediaRecorder.isTypeSupported('video/mp4;codecs=avc1.42E01E,mp4a.40.2')) {
                mimeType = 'video/mp4;codecs=avc1.42E01E,mp4a.40.2';
            } else if (MediaRecorder.isTypeSupported('video/mp4')) {
                mimeType = 'video/mp4';
            } else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')) {
                mimeType = 'video/webm;codecs=vp9,opus';
            }

            mediaRecorder = new MediaRecorder(combinedStream, { mimeType });

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };

            // 根據實際使用的 mimeType 動態決定副檔名 (.mp4 或 .webm)
            mediaRecorder.onstop = () => saveVideo(mimeType.includes('mp4') ? 'mp4' : 'webm');
        }

        // 4. 開始/停止錄影開關
        function toggleRecording() {
            if (!isRecording) {
                // 開始錄影
                recordedChunks = [];
                mediaRecorder.start();
                isRecording = true;

                btnRecord.innerText = "停止錄影 (STOP)";
                btnRecord.style.borderColor = "#ff3333";
                btnRecord.style.color = "#ff3333";
                recIndicator.classList.add("recording");
                recText.innerText = "RECORDING...";
                canvasElement.classList.add("recording-border");
            } else {
                // 停止錄影
                mediaRecorder.stop();
                isRecording = false;

                btnRecord.innerText = "開始錄影 (REC)";
                btnRecord.style.borderColor = "#00ff66";
                btnRecord.style.color = "#00ff66";
                recIndicator.classList.remove("recording");
                recText.innerText = "STANDBY";
                canvasElement.classList.remove("recording-border");
            }
        }

        // 5. 下載 WebM 影片檔
        function saveVideo_webm() {
            const blob = new Blob(recordedChunks, { type: "video/webm" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = `facemesh_record_${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }
        function saveVideo(ext = 'webm') {
            const mimeType = ext === 'mp4' ? 'video/mp4' : 'video/webm';
            const blob = new Blob(recordedChunks, { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = `facemesh_record_${Date.now()}.${ext}`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 100);
        }

        // 6. 偵測與渲染循環
        async function predictWebcam() {
            if (video.currentTime === lastVideoTime) {
                requestAnimationFrame(predictWebcam);
                return;
            }
            lastVideoTime = video.currentTime;

            // 清空畫布
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            const startTimeMs = performance.now();
            const results = faceLandmarker.detectForVideo(video, startTimeMs);

            if (results && results.faceLandmarks && results.faceLandmarks.length > 0) {
                const landmarks = results.faceLandmarks[0];

                const leftIris = landmarks[468];
                const rightIris = landmarks[473];

                // 繪製雷達十字線與瞳孔點
                if (leftIris && rightIris) {
                    const lX = Math.round(leftIris.x * canvasElement.width);
                    const lY = Math.round(leftIris.y * canvasElement.height);
                    const renderLX = canvasElement.width - (leftIris.x * canvasElement.width);
                    const renderLY = leftIris.y * canvasElement.height;

                    const rX = Math.round(rightIris.x * canvasElement.width);
                    const rY = Math.round(rightIris.y * canvasElement.height);
                    const renderRX = canvasElement.width - (rightIris.x * canvasElement.width);
                    const renderRY = rightIris.y * canvasElement.height;

                    coordDisplay.innerHTML = `L_EYE >> X: ${lX}, Y: ${lY}<br>R_EYE >> X: ${rX}, Y: ${rY}`;

                    // 雷達十字線 (亮藍色)
                    canvasCtx.strokeStyle = "rgba(0, 255, 255, 0.4)";
                    canvasCtx.lineWidth = 1;

                    // 左眼十字
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(0, renderLY); canvasCtx.lineTo(canvasElement.width, renderLY);
                    canvasCtx.moveTo(renderLX, 0); canvasCtx.lineTo(renderLX, canvasElement.height);
                    canvasCtx.stroke();

                    // 右眼十字
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(0, renderRY); canvasCtx.lineTo(canvasElement.width, renderRY);
                    canvasCtx.moveTo(renderRX, 0); canvasCtx.lineTo(renderRX, canvasElement.height);
                    canvasCtx.stroke();

                    // 瞳孔亮點
                    canvasCtx.fillStyle = "#00ffff";
                    canvasCtx.beginPath(); canvasCtx.arc(renderLX, renderLY, 5, 0, 2 * Math.PI); canvasCtx.fill();
                    canvasCtx.beginPath(); canvasCtx.arc(renderRX, renderRY, 5, 0, 2 * Math.PI); canvasCtx.fill();
                }

                // 繪製其餘 470 多個網格點
                canvasCtx.fillStyle = "rgba(0, 255, 102, 0.6)";
                landmarks.forEach((point, index) => {
                    if (index !== 468 && index !== 473) {
                        const renderX = canvasElement.width - (point.x * canvasElement.width);
                        const renderY = point.y * canvasElement.height;

                        canvasCtx.beginPath();
                        canvasCtx.arc(renderX, renderY, 1.5, 0, 2 * Math.PI);
                        canvasCtx.fill();
                    }
                });
            } else {
                coordDisplay.innerText = "STANDBY (未偵測到人臉)";
            }

            requestAnimationFrame(predictWebcam);
        }

        // 初始化啟動
        initFace();
        ///toggleRecording();

        document.addEventListener('click', function(event) {
            toggleRecording();
        }, { once: true });
    </script>
</body>
</html>
